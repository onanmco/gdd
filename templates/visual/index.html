<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GDD Visual Companion</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }
      body {
        margin: 0;
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding-bottom: 24px;
        border-bottom: 1px solid #d9e0ec;
      }
      h1 {
        margin: 0;
        font-size: 28px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
        margin-top: 24px;
      }
      .panel {
        min-height: 180px;
        border: 1px solid #d9e0ec;
        border-radius: 8px;
        background: #ffffff;
        padding: 18px;
      }
      button {
        border: 1px solid #9aa9bc;
        border-radius: 6px;
        background: #ffffff;
        color: #172033;
        padding: 8px 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>GDD Visual Companion</h1>
          <p>Replace these panels with plan-specific, non-functional UI states.</p>
        </div>
        <button data-event="approved">Approve Direction</button>
      </header>
      <section class="grid">
        <article class="panel" data-event="selected:primary-state">
          <h2>Primary State</h2>
          <p>Show the most important user workflow here.</p>
        </article>
        <article class="panel" data-event="selected:empty-state">
          <h2>Empty State</h2>
          <p>Show the first-run or no-data state here.</p>
        </article>
        <article class="panel" data-event="selected:error-state">
          <h2>Error State</h2>
          <p>Show recoverable errors and validation feedback here.</p>
        </article>
      </section>
    </main>
    <script>
      document.addEventListener("click", (event) => {
        const target = event.target.closest("[data-event]");
        if (!target) return;
        fetch("/events", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            timestamp: new Date().toISOString(),
            event: target.dataset.event,
            text: target.textContent.trim()
          })
        }).catch(() => {});
      });
    </script>
  </body>
</html>
